name: Build Image

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-image
  cancel-in-progress: true

env:
  GAR_LOCATION: ${{ vars.GAR_LOCATION || 'europe-central2' }}
  GCP_PROJECT: ${{ vars.GCP_PROJECT || 'theitemapp' }}
  GAR_REPOSITORY: ${{ vars.GAR_REPOSITORY || 'theitemapp' }}
  AGENT_IMAGE: europe-central2-docker.pkg.dev/theitemapp/theitemapp/fleet-agent

jobs:
  # Public agent → Artifact Registry (same registry as every other app image),
  # multi-arch. This is the thing remote nodes pull. Needs the deploy SA to have
  # roles/artifactregistry.writer on the GAR repo.
  agent:
    name: Build & push fleet-agent
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_DEPLOY_SA_KEY }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${{ env.GAR_LOCATION }}-docker.pkg.dev" --quiet

      - name: Extract version
        id: ver
        run: echo "v=$(node -e "console.log(require('./package.json').version || 'latest')")" >> "$GITHUB_OUTPUT"

      - name: Build & push fleet-agent
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.AGENT_IMAGE }}:${{ github.sha }}
            ${{ env.AGENT_IMAGE }}:${{ steps.ver.outputs.v }}
            ${{ env.AGENT_IMAGE }}:latest
          cache-from: type=gha,scope=fleet-agent
          cache-to: type=gha,mode=max,scope=fleet-agent
