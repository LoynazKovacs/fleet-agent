name: Build Image

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-image
  cancel-in-progress: true

env:
  AGENT_IMAGE: ghcr.io/loynazkovacs/fleet-agent

jobs:
  # Public agent → GHCR, multi-arch. This is the thing remote hosts pull.
  agent:
    name: Build & push fleet-agent
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version
        id: ver
        run: echo "v=$(node -e "console.log(require('./package.json').version || 'latest')")" >> "$GITHUB_OUTPUT"

      - name: Build & push fleet-agent
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.AGENT_IMAGE }}:${{ github.sha }}
            ${{ env.AGENT_IMAGE }}:${{ steps.ver.outputs.v }}
            ${{ env.AGENT_IMAGE }}:latest
          cache-from: type=gha,scope=fleet-agent
          cache-to: type=gha,mode=max,scope=fleet-agent
