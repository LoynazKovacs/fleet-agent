# Fleet NODE bring-up — everything a managed Docker host needs, in code.
#
# Per-service Tailscale SIDECAR model: the node just joins the tailnet (a
# kernel-mode uplink) and runs the agent. The agent receives deploy commands and
# brings up each deployed service with its OWN ephemeral `tag:fleet` Tailscale
# sidecar, reachable by MagicDNS. No subnet routing, no fleet-net, no route
# approval — that older model is gone.
#
# Two containers:
#   fleet-tailscale — puts the host on the tailnet in KERNEL mode (the uplink),
#                     tagged `tag:fleet`, so the agent can reach the control
#                     plane (fleet-control) by MagicDNS.
#   fleet-agent     — shares fleet-tailscale's netns, mounts the Docker socket,
#                     dials the control plane, and runs deploy/control commands
#                     once the node is approved. Carries no platform secrets.
#
# Bring a node online:
#   1. (first time) docker login the private Artifact Registry — see .env.example.
#   2. cp .env.example .env   &&   edit .env (name, core URL, this node's auth key)
#   3. docker compose up -d
#   4. Approve the node in the Fleet UI.
#
# Update the agent later: the "Update agent" button on the node row (control-
# plane-driven; no node-side registry creds needed).

services:
  # ── On the tailnet, in KERNEL mode — the UPLINK ────────────────────────────
  # TS_USERSPACE=false is critical: userspace networking can't share the netns
  # with the agent the way the sidecar model needs. Kernel mode brings up a real
  # tailscale0 tun device. NET_ADMIN/NET_RAW + /dev/net/tun + ip_forward are what
  # kernel mode needs; they are network-scoped, not host-root.
  fleet-tailscale:
    image: tailscale/tailscale:latest
    hostname: ${FLEET_NODE_NAME:?set FLEET_NODE_NAME in .env}
    container_name: fleet-tailscale
    cap_add:
      - NET_ADMIN
      - NET_RAW
    devices:
      - /dev/net/tun:/dev/net/tun
    sysctls:
      net.ipv4.ip_forward: "1"
    environment:
      TS_USERSPACE: "false"
      TS_AUTHKEY: ${FLEET_TS_AUTHKEY:?paste this node's Tailscale auth key into .env}
      TS_HOSTNAME: ${FLEET_NODE_NAME}
      TS_STATE_DIR: /var/lib/tailscale
      TS_ACCEPT_DNS: "true"
      # Join the tailnet as a tagged device so the agent can reach the control
      # plane (fleet-control) by MagicDNS. No subnet routes are advertised.
      TS_EXTRA_ARGS: --advertise-tags=tag:fleet
    volumes:
      - fleet-tailscale-state:/var/lib/tailscale
    restart: unless-stopped

  # ── The agent: dials the control plane THROUGH the tailnet ─────────────────
  # Shares fleet-tailscale's netns, so its only route to the control plane is the
  # tailnet. Mounts the Docker socket to manage this host. Carries no platform
  # secrets, so the image is safe to pull onto any node.
  fleet-agent:
    image: ${FLEET_AGENT_IMAGE:-europe-central2-docker.pkg.dev/theitemapp/theitemapp/fleet-agent:latest}
    pull_policy: always   # always fetch the newest agent on `up`
    container_name: fleet-agent
    network_mode: service:fleet-tailscale
    depends_on:
      - fleet-tailscale
    environment:
      # The compose service name the self-update helper recreates (this service).
      FLEET_COMPOSE_SERVICE: fleet-agent
      # Host path of THIS repo (compose + .env), handed to the detached helper
      # that performs control-plane-driven self-update. ${PWD} = the dir you run
      # `docker compose` in; set FLEET_COMPOSE_DIR in .env if you run from elsewhere.
      FLEET_COMPOSE_DIR: ${FLEET_COMPOSE_DIR:-${PWD}}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - fleet-agent-id:/data
    command:
      - --core-url
      - ${FLEET_CORE_URL:?set FLEET_CORE_URL in .env (the control plane MagicDNS URL, e.g. http://fleet-control.tail28a9b4.ts.net:3012)}
      - --join-key
      - ${FLEET_JOIN_KEY:?set FLEET_JOIN_KEY in .env}
      - --name
      - ${FLEET_NODE_NAME}
    restart: unless-stopped

volumes:
  # Persists the Tailscale node identity → survives key expiry / restarts.
  fleet-tailscale-state:
  # Persists the agent's stable node id AND its issued per-node token.
  fleet-agent-id:
